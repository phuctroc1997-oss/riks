<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Riks AI logo</title>
  <desc id="desc">Animated dark gradient banner with the Riks AI wordmark and orbital intelligence mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.5" stop-color="#10243c"/>
      <stop offset="1" stop-color="#031b16"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 480 180" to="360 480 180" dur="18s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(226 176) rotate(48) scale(210 180)">
      <stop stop-color="#36f5b9" stop-opacity="0.75"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="338" y1="116" x2="690" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="960" height="360" rx="36" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="358" rx="35" stroke="#7dd3fc" stroke-opacity="0.18"/>
  <circle cx="226" cy="176" r="190" fill="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.35">
    <path d="M0 256C126 198 192 308 318 246C444 184 508 42 650 112C792 182 828 88 960 44" stroke="#38bdf8" stroke-width="2"/>
    <path d="M0 300C144 238 214 330 340 282C482 228 558 116 684 164C810 212 846 164 960 128" stroke="#34d399" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="222" cy="180" r="82" fill="#07111f" fill-opacity="0.72" stroke="#7dd3fc" stroke-opacity="0.4" stroke-width="2"/>
    <ellipse cx="222" cy="180" rx="118" ry="38" stroke="#38bdf8" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 222 180" to="360 222 180" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="222" cy="180" rx="118" ry="38" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.75" transform="rotate(62 222 180)">
      <animateTransform attributeName="transform" type="rotate" from="62 222 180" to="422 222 180" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M181 222V138H224C244 138 257 149 257 166C257 178 251 187 240 192L263 222H238L218 195H203V222H181ZM203 177H222C230 177 235 173 235 166C235 159 230 156 222 156H203V177Z" fill="#f8fafc"/>
    <circle cx="282" cy="116" r="8" fill="#34d399">
      <animate attributeName="r" values="7;10;7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <text x="338" y="172" fill="url(#word)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="78" font-weight="800" letter-spacing="-3">Riks AI</text>
    <text x="343" y="218" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500" letter-spacing="0.5">Minimal agent workspace for code, tools, and local LLMs</text>
    <g transform="translate(344 244)">
      <rect width="110" height="32" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.28"/>
      <text x="18" y="22" fill="#7dd3fc" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">FastAPI</text>
      <rect x="124" width="102" height="32" rx="16" fill="#0f172a" stroke="#34d399" stroke-opacity="0.28"/>
      <text x="144" y="22" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Next.js</text>
      <rect x="240" width="96" height="32" rx="16" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.28"/>
      <text x="262" y="22" fill="#c4b5fd" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">Ollama</text>
    </g>
  </g>
</svg>
